// ── JSONBIN API ───────────────────────────────────────────────
async function fetchRemote(){
  const r = await fetch(BIN_URL+"/latest", { headers: MASTER_KEY ? {"X-Master-Key":MASTER_KEY} : {} });
  if(!r.ok) throw new Error("fetch error "+r.status);
  const j = await r.json();
  return j.record;
}

async function pushRemote(data){
  const r = await fetch(BIN_URL, {
    method: "PUT",
    headers: HEADERS,
    body: JSON.stringify(data)
  });
  if(!r.ok) throw new Error("push error "+r.status);
}

    if(!remote || !remote.quotas){
      remote = freshData();
      await pushRemote(remote);
    }

    // Month reset
    if(remote.monthKey !== monthKey()){
      remote.monthKey = monthKey();
      remote.todayDate = todayStr();
      remote.todayOrders = {};
      TEAMMATES.forEach(n => { remote.quotas[n] = MONTHLY_QUOTA; });
      await pushRemote(remote);
    }

    // Day reset (new day, same month)
    if(remote.todayDate !== todayStr()){
      // Archive yesterday's orders into history before resetting
      if(remote.todayDate && Object.keys(remote.todayOrders||{}).length > 0){
        if(!remote.history) remote.history = [];
        remote.history.unshift({ date: remote.todayDate, orders: {...remote.todayOrders} });
        if(remote.history.length > 60) remote.history = remote.history.slice(0,60);
      }
      remote.todayDate = todayStr();
      remote.todayOrders = {};
      await pushRemote(remote);
    }

    // Ensure all teammates have quota entry
    TEAMMATES.forEach(n => {
      if(remote.quotas[n] === undefined) remote.quotas[n] = MONTHLY_QUOTA;
    });

    shared = remote;
    syncStatus = "ok";
  } catch(e){
    syncStatus = "error";
    if(!shared) shared = freshData();
    showToast("Sin conexión — mostrando datos locales","warn");
  }
  updateSyncBtn();
  render();
}

function updateSyncBtn(){
  const btn = document.querySelector(".hdr-btn[onclick='syncNow()']");
  if(!btn) return;
  if(syncStatus==="syncing"){ btn.style.opacity="0.4"; btn.textContent="🔄"; }
  else if(syncStatus==="error"){ btn.style.opacity="1"; btn.textContent="⚠️"; }
  else { btn.style.opacity="1"; btn.textContent="🔄"; }
}

// ── INIT ─────────────────────────────────────────────────────
async function init(){
  document.getElementById("hdr-date").textContent = "📅 " + new Date().toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});
  await syncNow();
  // Auto-refresh every 20s when on home screen
  autoRefresh = setInterval(async ()=>{
    if(screen==="home") await syncNow();
  }, 20000);
}

// ── NAV ───────────────────────────────────────────────────────
function goHome(){ screen="home"; render(); }
function goAdmin(){ screen="admin"; adminTab="menu"; render(); }
function toggleAdmin(){ screen = screen==="admin"?"home":"admin"; render(); }
function setNavActive(){
  document.getElementById("nav-home").className="nav-btn"+(screen!=="admin"?" active":"");
  document.getElementById("nav-admin").className="nav-btn"+(screen==="admin"?" active":"");
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  if(!shared){ return; }
  setNavActive();
  const body = document.getElementById("main-body");
  if(screen==="home") renderHome(body);
  else if(screen==="order") renderOrder(body);
  else if(screen==="admin") renderAdmin(body);
}

// HOME
function renderHome(body){
  const todayKeys = Object.keys(shared.todayOrders);

  let html = `<div class="status-bar"><div class="status-dot${syncStatus==='syncing'?' syncing':syncStatus==='error'?' error':''}"></div>
    <span>${syncStatus==='syncing'?'Sincronizando...':syncStatus==='error'?'Sin conexión':'Sincronizado · se actualiza cada 20s'}</span></div>`;

  html += `<div class="section-label">¿Quién pedís hoy?</div><div class="user-grid">`;
  TEAMMATES.forEach((name,i)=>{
    const quota = shared.quotas[name] ?? MONTHLY_QUOTA;
    const ordered = !!shared.todayOrders[name];
    const noQ = quota<=0 && !ordered;
    const col = AVA_COLORS[i%AVA_COLORS.length];
    const pct = (quota/MONTHLY_QUOTA)*100;
    html += `<div class="user-card${ordered?" ordered":""}${noQ?" no-quota":""}" onclick="selectUser('${name}')">`;
    if(ordered) html += `<div class="u-badge">✓</div>`;
    html += `<div class="u-avatar" style="background:${col.bg};color:${col.text}">${name[0]}</div>`;
    html += `<div class="u-name">${name}</div>`;
    html += `<div class="u-quota">${quota} vianda${quota!==1?"s":""}</div>`;
    html += `<div class="u-bar"><div class="u-fill" style="width:${pct}%;background:${pct<25?"#ff6b6b":"#e8c547"}"></div></div>`;
    html += `</div>`;
  });
  html += `</div>`;

  if(todayKeys.length){
    html += `<div class="today-box"><div class="today-box-hdr">
      <span class="today-box-title">Pedidos de hoy</span>
      <span class="today-count">${todayKeys.length} / ${TEAMMATES.length}</span>
    </div>`;
    todayKeys.forEach(name=>{
      const o = shared.todayOrders[name];
      html += `<div class="today-row">
        <span class="today-name">${name}</span>
        <span class="today-dish">${o.dish}${o.notes?" · "+o.notes:""}</span>
        <span class="today-cat">${CAT_ICONS[o.category]||""}</span>
        <button class="today-del" onclick="cancelOrder('${name}')">✕</button>
      </div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="empty-st"><div>🛒</div>Sin pedidos todavía<br><small style="color:#b8a898;margin-top:4px;display:block">Cada uno toca su nombre y elige su plato</small></div>`;
  }

  html += `<div class="action-row">
    <button class="wa-btn" onclick="openWhatsApp()" ${!todayKeys.length?"disabled":""}>
      <span style="font-size:17px">💬</span> Enviar por WhatsApp
    </button>
    <button class="copy-btn" onclick="copyMessage()" ${!todayKeys.length?"disabled":""} title="Copiar mensaje">📋</button>
  </div>`;

  body.innerHTML = html;
}

// ORDER
function renderOrder(body){
  const quota = shared.quotas[currentUser] ?? MONTHLY_QUOTA;
  const categories = [...new Set(shared.menu.map(d=>d.category))];

  let html = `<button class="back-btn" onclick="goHome()">← Volver</button>`;
  html += `<div class="order-greeting">Hola, <em>${currentUser}</em></div>`;
  html += `<div class="order-sub">Te quedan <strong>${quota}</strong> viandas este mes</div>`;

  html += `<div class="cat-tabs">`;
  categories.forEach(cat=>{
    const col = CAT_COLORS[cat]||{bg:"#f5f5f5",accent:"#999",text:"#555"};
    const active = activeCategory===cat;
    html += `<button class="cat-tab${active?" active":""}" style="${active?`background:${col.bg};border-color:${col.accent};color:${col.text}`:""}" onclick="setCategory('${cat}')">${CAT_ICONS[cat]} ${cat}</button>`;
  });
  html += `</div><div class="menu-list">`;

  shared.menu.filter(d=>d.category===activeCategory).forEach(item=>{
    const sel = selectedItem && selectedItem.id===item.id;
    html += `<div class="menu-item${sel?" selected":""}" onclick="selectItem(${item.id})">
      <div class="mi-radio"><div class="mi-dot"></div></div>
      <div class="mi-text">
        <div class="mi-name">${item.name}</div>
        ${item.desc?`<div class="mi-desc">${item.desc}</div>`:""}
      </div></div>`;
  });
  html += `</div>`;

  html += `<div class="section-label">Aclaraciones (opcional)</div>`;
  html += `<textarea class="notes-input" id="notes-ta" rows="2" placeholder="Sin sal, extra salsa, sin cebolla..." oninput="notes=this.value">${notes}</textarea>`;
  html += `<button class="confirm-btn" onclick="confirmOrder()" ${!selectedItem?"disabled":""}>Confirmar pedido ✓</button>`;

  body.innerHTML = html;
}

function setCategory(cat){ activeCategory=cat; render(); }

function selectItem(id){
  selectedItem = shared.menu.find(d=>d.id===id)||null;
  render();
  const ta = document.getElementById("notes-ta");
  if(ta){ ta.value=notes; }
}

async function confirmOrder(){
  if(!selectedItem) return;
  const user = currentUser;
  // Pull latest before writing to avoid overwriting others
  let data;
  try { data = await fetchRemote(); } catch(e){ data = shared; }
  if(!data || !data.quotas) data = shared;

  if((data.quotas[user]??MONTHLY_QUOTA) <= 0){ showToast("Sin viandas disponibles!","err"); return; }

  const notesVal = (document.getElementById("notes-ta")||{}).value || notes;
  data.todayOrders[user] = {
    dish: selectedItem.name,
    category: selectedItem.category,
    notes: notesVal,
    time: new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}),
  };
  data.quotas[user] = (data.quotas[user]??MONTHLY_QUOTA) - 1;

  try {
    await pushRemote(data);
    shared = data;
    showToast(`Pedido de ${user} registrado! ✓`);
    setTimeout(()=>{ screen="home"; currentUser=null; selectedItem=null; notes=""; render(); }, 900);
  } catch(e){
    showToast("Error al guardar, reintentá","err");
  }
}

async function cancelOrder(name){
  let data;
  try { data = await fetchRemote(); } catch(e){ data = shared; }
  if(data.todayOrders[name]){
    delete data.todayOrders[name];
    if((data.quotas[name]??0) < MONTHLY_QUOTA) data.quotas[name] = (data.quotas[name]??0)+1;
    try { await pushRemote(data); shared=data; }
    catch(e){ showToast("Error al cancelar","err"); return; }
  }
  showToast(`Pedido de ${name} cancelado`,"warn");
  render();
}

function selectUser(name){
  const quota = shared.quotas[name]??MONTHLY_QUOTA;
  if(shared.todayOrders[name]){ showToast(`${name} ya pidió hoy`,"warn"); return; }
  if(quota<=0){ showToast(`${name} sin viandas disponibles`,"err"); return; }
  currentUser=name; selectedItem=null; notes=""; activeCategory="Ensaladas"; screen="order"; render();
}

// ADMIN
function renderAdmin(body){
  let html = `<button class="back-btn" onclick="goHome()">← Volver</button>`;
  html += `<div class="admin-tabs">`;
  [["menu","📋 Menú"],["stock","📊 Stock"],["hist","📅 Historial"],["wa","💬 WhatsApp"]].forEach(([k,l])=>{
    html += `<button class="atab${adminTab===k?" active":""}" onclick="setAdminTab('${k}')">${l}</button>`;
  });
  html += `</div>`;

  if(adminTab==="menu"){
    html += `<div class="admin-title">Menú</div><div class="admin-sub">Agregá o eliminá platos</div><div class="dish-list">`;
    shared.menu.forEach(d=>{
      const col = CAT_COLORS[d.category]||{bg:"#eee",text:"#555"};
      html += `<div class="dish-row">
        <span class="dish-cat-pill" style="background:${col.bg};color:${col.text}">${CAT_ICONS[d.category]||""}</span>
        <span class="dish-name">${d.name}</span>
        <button class="dish-del" onclick="removeDish(${d.id})">✕</button>
      </div>`;
    });
    html += `</div><div class="add-form">
      <input class="add-input" id="new-name" placeholder="Nombre del plato *"/>
      <input class="add-input" id="new-desc" placeholder="Descripción (opcional)"/>
      <select class="add-select" id="new-cat">
        ${["Ensaladas","Rolls","Viandas","Por Encargue"].map(c=>`<option>${c}</option>`).join("")}
      </select>
      <button class="add-btn" onclick="addDish()">+ Agregar plato</button>
    </div>
    <button class="reset-menu-btn" onclick="resetMenu()">↺ Restablecer menú original</button>`;
  }

  if(adminTab==="stock"){
    html += `<div class="admin-title">Stock mensual</div><div class="admin-sub">Abono de ${MONTHLY_QUOTA} viandas por persona — editá manualmente si es necesario</div>`;
    TEAMMATES.forEach((name,i)=>{
      const quota = shared.quotas[name]??MONTHLY_QUOTA;
      const col = AVA_COLORS[i%AVA_COLORS.length];
      const pct = (quota/MONTHLY_QUOTA)*100;
      const used = MONTHLY_QUOTA-quota;
      html += `<div class="quota-card">
        <div class="qc-avatar" style="background:${col.bg};color:${col.text}">${name[0]}</div>
        <div class="qc-info">
          <div class="qc-name">${name}</div>
          <div class="qc-used">${used} usada${used!==1?"s":""} de ${MONTHLY_QUOTA}</div>
          <div class="qc-bar"><div class="qc-fill" style="width:${pct}%;background:${pct<25?"#ff6b6b":"#5cb860"}"></div></div>
          <div class="qc-controls">
            <button class="qc-ctrl-btn" onclick="adjustQuota('${name}',-1)">−</button>
            <input class="qc-manual-input" id="qi-${name}" type="number" min="0" max="99" value="${quota}"/>
            <button class="qc-ctrl-btn" onclick="adjustQuota('${name}',1)">+</button>
            <button class="qc-save-btn" onclick="saveQuota('${name}')">Guardar</button>
          </div>
        </div>
      </div>`;
    });
    html += `<button class="reset-month-btn" onclick="resetMonth()">🔄 Resetear todos a ${MONTHLY_QUOTA} viandas</button>`;
  }

  if(adminTab==="hist"){
    const history = shared.history||[];
    html += `<div class="admin-title">Historial de pedidos</div><div class="admin-sub">Pedidos registrados por fecha</div>`;
    if(history.length){
      html += `<button class="download-btn" onclick="downloadHistory()">⬇️ Descargar historial completo</button>`;
      history.forEach(day=>{
        const dayOrders = Object.entries(day.orders||{});
        html += `<div class="hist-day">
          <div class="hist-day-hdr">
            <span class="hist-day-date">📅 ${day.date}</span>
            <span class="hist-day-count">${dayOrders.length} pedido${dayOrders.length!==1?"s":""}</span>
          </div>`;
        dayOrders.forEach(([name,o])=>{
          html += `<div class="hist-row">
            <span class="hist-name">${name}</span>
            <span class="hist-dish">${o.dish}</span>
            ${o.notes?`<span class="hist-notes">${o.notes}</span>`:""}
          </div>`;
        });
        html += `</div>`;
      });
    } else {
      html += `<div class="no-history"><div>📭</div>Todavía no hay historial guardado.<br><small style="color:#b8a898">Los pedidos se archivan automáticamente cada día.</small></div>`;
    }
  }

  if(adminTab==="wa"){
    html += `<div class="admin-title">WhatsApp</div><div class="admin-sub">Número de la rotisería (con código de país)</div>
    <div class="wa-cfg">
      <input id="wa-input" placeholder="Ej: 5491112345678" value="${shared.whatsappNumber||""}"/>
      <button class="wa-save" onclick="saveWA()">💾 Guardar número</button>
    </div>`;
    const msg = buildMessage();
    if(msg){
      html += `<div class="admin-sub" style="margin-top:14px">Vista previa del mensaje de hoy:</div>`;
      html += `<div class="wa-preview">${msg.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>`;
    }
  }

  body.innerHTML = html;
}

function setAdminTab(tab){ adminTab=tab; render(); }

function adjustQuota(name, delta){
  const input = document.getElementById("qi-"+name);
  if(!input) return;
  let val = parseInt(input.value)||0;
  val = Math.max(0, Math.min(99, val+delta));
  input.value = val;
}

async function saveQuota(name){
  const input = document.getElementById("qi-"+name);
  if(!input) return;
  const val = Math.max(0, Math.min(99, parseInt(input.value)||0));
  let data;
  try { data = await fetchRemote(); } catch(e){ data = shared; }
  data.quotas[name] = val;
  try {
    await pushRemote(data);
    shared = data;
    showToast(`Stock de ${name} actualizado a ${val} ✓`);
    render();
  } catch(e){ showToast("Error al guardar","err"); }
}

function downloadHistory(){
  const history = shared.history||[];
  if(!history.length){ showToast("Sin historial para descargar","warn"); return; }
  let csv = "Fecha,Nombre,Plato,Aclaración,Hora\n";
  history.forEach(day=>{
    Object.entries(day.orders||{}).forEach(([name,o])=>{
      const notes = (o.notes||"").replace(/,/g,";");
      const dish = (o.dish||"").replace(/,/g,";");
      csv += `${day.date},${name},${dish},${notes},${o.time||""}\n`;
    });
  });
  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="historial_pedidos_axion.csv";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast("Historial descargado ✓");
}

async function removeDish(id){
  shared.menu = shared.menu.filter(d=>d.id!==id);
  await pushRemote(shared); render();
}

async function addDish(){
  const name = (document.getElementById("new-name")||{}).value?.trim();
  if(!name){ showToast("Ingresá el nombre","err"); return; }
  const desc = (document.getElementById("new-desc")||{}).value?.trim()||"";
  const category = (document.getElementById("new-cat")||{}).value||"Ensaladas";
  shared.menu.push({id:Date.now(),name,desc,category});
  await pushRemote(shared); showToast("Plato agregado ✓"); render();
}

async function resetMenu(){
  if(!confirm("¿Restablecer el menú original?")) return;
  shared.menu = [...DEFAULT_MENU];
  await pushRemote(shared); showToast("Menú restablecido ✓"); render();
}

async function resetMonth(){
  if(!confirm("¿Resetear el abono mensual? (15 viandas por persona)")) return;
  TEAMMATES.forEach(n=>{ shared.quotas[n]=MONTHLY_QUOTA; });
  shared.todayOrders={};
  shared.monthKey=monthKey();
  shared.todayDate=todayStr();
  await pushRemote(shared); showToast("Abono reseteado ✓"); render();
}

async function saveWA(){
  const val = (document.getElementById("wa-input")||{}).value?.trim()||"";
  shared.whatsappNumber = val;
  await pushRemote(shared); showToast("Número guardado ✓"); render();
}

// MESSAGE
function buildMessage(){
  const orders = shared.todayOrders;
  const keys = Object.keys(orders);
  if(!keys.length) return null;
  const date = new Date().toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});
  let msg = `🍽️ *Pedido del ${date}*\n\n`;
  keys.forEach(name=>{
    const o = orders[name];
    msg += `• *${name}*: ${o.dish}`;
    if(o.notes) msg += ` _(${o.notes})_`;
    msg += "\n";
  });
  msg += `\n_Total: ${keys.length} vianda${keys.length!==1?"s":""}_\n¡Gracias! 🙌`;
  return msg;
}

function openWhatsApp(){
  const msg = buildMessage(); if(!msg) return;
  const number = (shared.whatsappNumber||"").replace(/\D/g,"");
  window.open(number?`https://wa.me/${number}?text=${encodeURIComponent(msg)}`:`https://wa.me/?text=${encodeURIComponent(msg)}`,"_blank");
}

function copyMessage(){
  const msg = buildMessage(); if(!msg) return;
  if(navigator.clipboard){
    navigator.clipboard.writeText(msg).then(()=>showToast("Mensaje copiado! 📋")).catch(()=>fallbackCopy(msg));
  } else { fallbackCopy(msg); }
}

function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value=text; ta.style.cssText="position:fixed;opacity:0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); showToast("Mensaje copiado! 📋"); }
  catch(e){ showToast("No se pudo copiar","err"); }
  document.body.removeChild(ta);
}

function showToast(msg,type="ok"){
  const ex=document.getElementById("toast-el"); if(ex) ex.remove();
  if(toastTimer) clearTimeout(toastTimer);
  const t=document.createElement("div");
  t.id="toast-el"; t.className="toast"+(type!=="ok"?" "+type:""); t.textContent=msg;
  document.body.appendChild(t);
  toastTimer=setTimeout(()=>t.remove(),2800);
}

init();
</script>
